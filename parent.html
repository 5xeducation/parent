<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5X Education · Parent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f0f7fa;--bg2:#e2eef5;--bg3:#d4e5f0;
    --border:#b8d4e4;--muted:#5a8aaa;--dim:#2a4a60;--ink:#0d1f35;
    --green:#0a9a78;--green-bg:rgba(10,154,120,.08);--green-border:rgba(10,154,120,.2);
    --red:#cc3333;--red-bg:rgba(200,50,50,.06);--red-border:rgba(200,50,50,.18);
    --amber:#a07010;--amber-bg:rgba(160,112,16,.08);--amber-border:rgba(160,112,16,.2);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:#c8dce8;min-height:100%;}
  body{font-family:'Inter',sans-serif;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px;}
  #frame{width:100%;max-width:900px;background:var(--bg);border-radius:18px;border:3px solid var(--ink);box-shadow:0 12px 60px rgba(13,31,53,.2);-webkit-mask-image:-webkit-radial-gradient(white,black);transform:translateZ(0);}
  #topbar{background:var(--ink);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;border-radius:15px 15px 0 0;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:#e8f4f8;}
  .logo span{color:#5de8c0;}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .user-email{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4a7a9a;}
  .btn-signout{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 14px;background:transparent;color:#4a7a9a;border:1px solid #1e3a5f;border-radius:6px;cursor:pointer;transition:color .15s;}
  .btn-signout:hover{color:#e8f4f8;}
  #main{padding:36px 32px 60px;}

  /* AUTH */
  .auth-wrap{max-width:420px;margin:0 auto;padding:40px 0;}
  .auth-title{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--ink);margin-bottom:6px;}
  .auth-sub{font-size:14px;color:var(--muted);font-weight:300;margin-bottom:32px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .field input{width:100%;padding:12px 14px;background:white;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);transition:border-color .15s;}
  .field input:focus{outline:none;border-color:var(--green);}
  .btn-primary{width:100%;padding:13px;background:var(--ink);color:#e8f4f8;border:none;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;cursor:pointer;transition:opacity .15s;}
  .btn-primary:hover{opacity:.85;}
  .btn-primary:disabled{opacity:.4;cursor:default;}
  .auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
  .auth-toggle a{color:var(--green);cursor:pointer;text-decoration:underline;}
  .auth-msg{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:16px;display:none;}
  .auth-msg.error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);}
  .auth-msg.success{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);}

  /* DASHBOARD */
  .dash-header{margin-bottom:28px;}
  .dash-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
  .dash-title{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--ink);line-height:1;}
  .dash-sub{font-size:14px;color:var(--muted);font-weight:300;margin-top:4px;}
  .no-students{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;color:var(--muted);font-size:14px;font-weight:300;}

  /* STUDENT CARD */
  .student-card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .student-card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
  .student-name{font-size:17px;font-weight:500;color:var(--ink);}
  .student-email-el{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .traffic-light{display:flex;align-items:center;gap:8px;}
  .tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .tl-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;}
  .tl-green{background:var(--green);}
  .tl-amber{background:#d4920a;}
  .tl-red{background:var(--red);}
  .student-card-body{padding:20px 22px;}

  /* subject row */
  .subject-row{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .subject-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .subject-name{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
  .subject-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
  .subject-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
  .subject-stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--ink);}
  .subject-stat-val.green{color:var(--green);}
  .subject-stat-val.amber{color:var(--amber);}
  .subject-stat-val.red{color:var(--red);}
  .subject-stat-key{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

  /* progress bar */
  .prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease;}
  .prog-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);min-width:30px;text-align:right;}

  /* AI summary */
  .ai-summary{padding:12px 14px;background:rgba(10,154,120,.05);border:1px solid var(--green-border);border-radius:8px;font-size:13px;color:var(--dim);line-height:1.6;font-style:italic;}
  .ai-summary-loading{padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--muted);}

  /* flagged */
  .flagged-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .flag-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;border-radius:20px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}

  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-wrap{padding:40px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div id="frame">
  <div id="topbar">
    <div class="logo">5X <span>EDUCATION</span></div>
    <div class="topbar-right">
      <span class="user-email" id="user-email-el"></span>
      <button class="btn-signout" id="signout-btn" style="display:none" onclick="signOut()">SIGN OUT</button>
    </div>
  </div>
  <div id="main">

    <!-- AUTH -->
    <div id="auth-screen" class="auth-wrap">
      <p class="auth-eyebrow" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;">Parent Portal</p>
      <h1 class="auth-title">5X Education</h1>
      <p class="auth-sub" id="auth-subtitle">Sign in to track your child's progress.</p>
      <div class="auth-msg" id="auth-msg"></div>
      <div id="login-form">
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"></div>
        <button class="btn-primary" onclick="signIn()">SIGN IN →</button>
        <div class="auth-toggle">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
      </div>
      <div id="signup-form" style="display:none">
        <div class="field"><label>Full name</label><input type="text" id="signup-name" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="your@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 6 characters"></div>
        <button class="btn-primary" onclick="signUp()">CREATE ACCOUNT →</button>
        <div class="auth-toggle">Already have an account? <a onclick="showLogin()">Sign in</a></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-screen" style="display:none">
      <div class="dash-header">
        <p class="dash-eyebrow">Parent Dashboard</p>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><h2 class="dash-title">My Students</h2><button onclick="refreshDashboard()" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;padding:8px 16px;background:var(--ink);color:#e8f4f8;border:none;border-radius:6px;cursor:pointer;" id="refresh-btn">↻ REFRESH</button></div>
        <p class="dash-sub" id="dash-sub">Loading your students...</p>
      </div>
      <div id="students-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>

  </div>
</div>

<script>
let _dashParentEmail = null;

function refreshDashboard() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '↻ REFRESHING...'; btn.disabled = true; }
  loadDashboard(_dashParentEmail).then(() => {
    if (btn) { btn.textContent = '↻ REFRESH'; btn.disabled = false; }
  });
}

// Auto-refresh every 60 seconds
setInterval(() => {
  if (_dashParentEmail) loadDashboard(_dashParentEmail);
}, 60000);

const SUPABASE_URL = 'https://ayecmyknwnzkxnjsepey.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5ZWNteWtud256a3huanNlcGV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Njc0MjksImV4cCI6MjA5MzE0MzQyOX0.E-f1bQZVLd0v39PKk1_2cA4s0R40hVHsgOiFIQnyg44';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// AI feedback via secure proxy

const SUBJECT_LABELS = { enzymes: 'Biology · Enzymes' };
const TOTAL_CONCEPTS = { enzymes: 5 };

// ── AUTH ─────────────────────────────────────────────────────────────────────
db.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    if (event !== 'SIGNED_IN' && event !== 'INITIAL_SESSION') return;
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/parents?id=eq.' + session.user.id + '&select=id',
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + session.access_token,
            'Content-Type': 'application/json'
          }
        }
      );
      const rows = await res.json();
      if (!rows || rows.length === 0) {
        await db.auth.signOut();
        const el = document.getElementById('auth-msg');
        el.textContent = 'Access denied. This portal is for parents only.';
        el.className = 'auth-msg error'; el.style.display = 'block';
        return;
      }
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('user-email-el').textContent = session.user.email;
      document.getElementById('signout-btn').style.display = 'block';
      _dashParentEmail = session.user.email;
      loadDashboard(session.user.email);
    } catch(e) {
      console.error('Auth error:', e);
    }
  } else {
    document.getElementById('auth-screen').style.display = 'block';
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('signout-btn').style.display = 'none';
    document.getElementById('user-email-el').textContent = '';
  }
});

function showMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg; el.className = `auth-msg ${type}`; el.style.display = 'block';
}

function showSignup() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('auth-subtitle').textContent = 'Create a parent account.';
}
function showLogin() {
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('auth-subtitle').textContent = "Sign in to track your child's progress.";
}

async function signIn() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showMsg('Please enter your email and password.', 'error');
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) showMsg(error.message, 'error');
}

async function signUp() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) return showMsg('Please fill in all fields.', 'error');
  if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
  const { data, error } = await db.auth.signUp({ email, password });
  if (error) return showMsg(error.message, 'error');
  if (data.user) {
    await db.from('parents').upsert({
      id: data.user.id, email, full_name: name
    });
    showMsg('Account created! You can now sign in.', 'success');
    showLogin();
  }
}

async function signOut() {
  await db.auth.signOut();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
async function loadDashboard(parentEmail) {
  const list = document.getElementById('students-list');
  list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';


  const { data: students, error } = await db
    .from('students')
    .select('id, full_name, email')
    .eq('parent_email', parentEmail);


  if (error || !students || students.length === 0) {
    document.getElementById('dash-sub').textContent = 'No students linked to your account yet.';
    list.innerHTML = `<div class="no-students">
      No students have added your email as their parent yet.<br><br>
      Ask your child to enter <strong>${parentEmail}</strong> as their parent email when they sign up on the student platform.
    </div>`;
    return;
  }

  document.getElementById('dash-sub').textContent = `${students.length} student${students.length > 1 ? 's' : ''} linked to your account`;
  list.innerHTML = '';

  for (const student of students) {
    const card = await buildStudentCard(student);
    list.appendChild(card);
  }
}

async function buildStudentCard(student) {
  // Get all progress records for this student
  const { data: progressRows, error: progError } = await db
    .from('progress')
    .select('*')
    .eq('student_id', student.id);


  const card = document.createElement('div');
  card.className = 'student-card';

  // Calculate overall status
  const status = overallStatus(progressRows || []);

  card.innerHTML = `
    <div class="student-card-header">
      <div>
        <div class="student-name">${student.full_name || 'Student'}</div>
        <div class="student-email-el">${student.email}</div>
      </div>
      <div class="traffic-light">
        <div class="tl-dot ${status.dotClass}"></div>
        <span class="tl-label" style="color:${status.color}">${status.label}</span>
      </div>
    </div>
    <div class="student-card-body" id="body-${student.id}">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>`;

  // Build subject sections async
  setTimeout(async () => {
    const body = document.getElementById(`body-${student.id}`);
    body.innerHTML = '';

    const subjects = progressRows && progressRows.length > 0
      ? progressRows
      : [{ subject: 'enzymes', concept_results: [], concept_idx: 0, exam_score: null, exam_grade: null }];

    for (const prog of subjects) {
      const section = await buildSubjectSection(prog);
      body.appendChild(section);
    }
  }, 0);

  return card;
}

function overallStatus(progressRows) {
  if (!progressRows || progressRows.length === 0)
    return { dotClass:'tl-amber', label:'NOT STARTED', color:'#d4920a' };

  let totalConcepts = 0, completedConcepts = 0, flaggedCount = 0;
  for (const p of progressRows) {
    const total = TOTAL_CONCEPTS[p.subject] || 5;
    const results = p.concept_results || [];
    totalConcepts += total;
    completedConcepts += results.length;
    results.forEach(r => flaggedCount += (r.flaggedTags && r.flaggedTags.length > 0 ? 1 : 0));
  }

  const pct = totalConcepts > 0 ? completedConcepts / totalConcepts : 0;
  if (pct >= 0.8 && flaggedCount === 0) return { dotClass:'tl-green', label:'ON TRACK', color:'var(--green)' };
  if (pct >= 0.4 || flaggedCount <= 2) return { dotClass:'tl-amber', label:'NEEDS ATTENTION', color:'#d4920a' };
  return { dotClass:'tl-red', label:'AT RISK', color:'var(--red)' };
}

async function buildSubjectSection(prog) {
  const section = document.createElement('div');
  section.className = 'subject-row';

  const results = prog.concept_results || [];
  const total = TOTAL_CONCEPTS[prog.subject] || 5;
  const completed = results.length;
  const pct = total > 0 ? Math.round(completed / total * 100) : 0;

  // Average diagnostic score
  const s1Scores = results.filter(r => r.s1Total > 0);
  const avgScore = s1Scores.length > 0
    ? Math.round(s1Scores.reduce((sum, r) => sum + (r.s1Correct / r.s1Total * 100), 0) / s1Scores.length)
    : null;

  // Flagged tags
  // Flagged concepts — concept level only
  const CONCEPT_NAMES = {
    enzymes: ['Enzyme Basics','Enzyme Function','Rate of Enzyme Activity','Experiments on Enzyme Activity','Enzymes in Industry']
  };
  const flaggedConcepts = results
    .map((r,i) => r.flaggedTags && r.flaggedTags.length > 0 ? (CONCEPT_NAMES[prog.subject]?.[i] || `Concept ${i+1}`) : null)
    .filter(Boolean);

  // Grade colour
  function gradeColor(s) {
    if (s >= 80) return 'green'; if (s >= 60) return 'amber'; return 'red';
  }

  section.innerHTML = `
    <div class="subject-name">${SUBJECT_LABELS[prog.subject] || prog.subject}</div>
    <div class="subject-stats">
      <div class="subject-stat">
        <div class="subject-stat-val ${pct >= 80 ? 'green' : pct >= 40 ? 'amber' : 'red'}">${completed}/${total}</div>
        <div class="subject-stat-key">Concepts Done</div>
      </div>
      <div class="subject-stat">
        <div class="subject-stat-val ${avgScore !== null ? gradeColor(avgScore) : ''}">${avgScore !== null ? avgScore + '%' : '—'}</div>
        <div class="subject-stat-key">Avg Diagnostic</div>
      </div>
      <div class="subject-stat">
        <div class="subject-stat-val ${flaggedConcepts.length === 0 ? 'green' : flaggedConcepts.length <= 2 ? 'amber' : 'red'}">${flaggedConcepts.length}</div>
        <div class="subject-stat-key">Flagged Concepts</div>
      </div>
      <div class="subject-stat">
        <div class="subject-stat-val ${prog.exam_grade ? gradeColor(prog.exam_score / 30 * 100) : ''}">${prog.exam_grade || '—'}</div>
        <div class="subject-stat-key">Exam Grade</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-label">${pct}%</span>
    </div>
    ${flaggedConcepts.length > 0 ? `<div class="flagged-row">${flaggedConcepts.map(name => `<span class="flag-chip">⚑ ${name}</span>`).join('')}</div>` : ''}
    <div class="ai-summary-loading" id="ai-${prog.student_id}-${prog.subject}">Mentor feedback</div>`;

  // Generate AI summary
  setTimeout(() => generateAISummary(prog, completed, total, avgScore, flaggedConcepts, section), 100);

  return section;
}

async function generateAISummary(prog, completed, total, avgScore, flagged, section) {
  const el = section.querySelector(`[id^="ai-"]`);
  if (!el) return;

  const prompt = `You are summarising a student's progress for their parent in one encouraging but honest sentence.

Subject: ${SUBJECT_LABELS[prog.subject] || prog.subject}
Concepts completed: ${completed} of ${total}
Average diagnostic score: ${avgScore !== null ? avgScore + '%' : 'not yet tested'}
Concepts flagged for mentor review: ${flagged.length > 0 ? flagged.join(', ') : 'none'}

Write ONE sentence (max 25 words) addressed to the parent starting with "Your child". Be specific, warm and honest. Do not mention exams or exam grades. No fluff.`;

  try {
    const res = await fetch('/.netlify/functions/mark', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 60,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() || '';
    if (text && el) {
      el.className = 'ai-summary';
      el.textContent = text;
    }
  } catch(e) {
    if (el) el.style.display = 'none';
  }
}

</script>
</body>
</html>
